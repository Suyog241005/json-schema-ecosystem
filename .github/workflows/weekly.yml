name: Collect Ecosystem Metrics

on:
  schedule:
    - cron: "0 0 * * 1" 
  workflow_dispatch: 

permissions:
  contents: write
  issues: write 

jobs:
  collect-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Better for git history and pushing

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm' # Speeds up subsequent runs

      - name: Install Dependencies
        run: npm ci

      - name: Run metrics script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run metrics

      - name: Run bowtie script
        run: npm run bowtie

      - name: Run Insights Collection script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run metrics:insights

      - name: Commit and Push Results
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          # Only commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update ecosystem metrics (Phase 1 & Insights) $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          fi

      - name: Notify on Failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "❌ Metrics Collection Failed" \
            --body "The weekly metrics collection failed on $(date). Please check the [workflow logs](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." \
            --label "bug,automated"
